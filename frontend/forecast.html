<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India District Weather Dashboard</title>

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Weather Background */

        #weatherBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;

            background-image:
                url("images/default_weather.jpg");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            transition: all 1s ease;
        }

        header {
            background: rgba(25,118,210,0.9);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .controls {

            background: rgba(255,255,255,0.9);

            backdrop-filter: blur(4px);

            padding: 15px;

            border-radius: 8px;

            display: flex;

            gap: 15px;

            flex-wrap: wrap;

            align-items: center;

            margin-bottom: 15px;
        }

        select,
        button {

            padding: 10px;

            min-width: 180px;

            border: 1px solid #ccc;

            border-radius: 5px;
        }

        button {

            background: #1976d2;

            color: white;

            cursor: pointer;

            border: none;
        }

        button:hover {
            opacity: 0.9;
        }

        #map {

            width: 100%;

            height: 550px;

            border-radius: 8px;

            margin-bottom: 20px;

            border: 1px solid #ccc;
        }

        .chart-container {

            background: rgba(255,255,255,0.9);

            backdrop-filter: blur(4px);

            padding: 15px;

            border-radius: 8px;
        }

        canvas {
            max-height: 450px;
        }

    </style>
</head>

<body>

    <!-- Dynamic Weather Background -->

    <div id="weatherBackground"></div>

    <header>
        <h1>🌦 India District Weather Forecast Dashboard</h1>
    </header>

    <div class="container">

        <!-- Filters -->

        <div class="controls">

            <div>
                <label><b>State</b></label><br>

                <select id="stateSelect">

                    <option value="">
                        All States
                    </option>

                </select>

            </div>

            <div>
                <label><b>District</b></label><br>

                <select id="districtSelect">

                    <option value="">
                        All Districts
                    </option>

                </select>

            </div>

            <div>
                <label><b>Date</b></label><br>

                <select id="dateSelect">

                    <option>
                        Loading...
                    </option>

                </select>

            </div>

            <div>
                <label><b>Time</b></label><br>

                <select id="timeSelect">

                    <option>
                        Loading...
                    </option>

                </select>

            </div>

            <div>

                <label><b>Download</b></label><br>

                <button id="downloadCSV">

                    ⬇ Download CSV

                </button>

            </div>

        </div>

        <!-- Map -->

        <div id="map"></div>

        <!-- Chart -->

        <div class="chart-container">

            <h2>
                📊 Weather Analysis
            </h2>

            <canvas id="myChart"></canvas>

        </div>

    </div>

    <!-- Leaflet -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Your Scripts -->

    <script src="map.js"></script>

    <script src="forecast.js"></script>

</body>

</html>
