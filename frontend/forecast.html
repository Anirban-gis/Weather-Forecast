<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Weather Forecast Dashboard</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        header {
            background: #1976d2;
            color: white;
            padding: 12px;
            text-align: center;
        }

        .container {
            padding: 15px;
        }

        .controls {
            background: white;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
            align-items: center;
        }

        select, button {
            padding: 8px;
            min-width: 160px;
        }

        button {
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #125aa0;
        }

        #map {
            height: 520px;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }

        .chart-container {
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        canvas {
            max-height: 400px;
        }
    </style>
</head>

<body>

<header>
    <h2>🌦 India District Weather Forecast Dashboard</h2>
</header>

<div class="container">

    <!-- CONTROLS -->
    <div class="controls">

        <select id="stateSelect">
            <option value="">All States</option>
        </select>

        <select id="districtSelect">
            <option value="">All Districts</option>
        </select>

        <select id="dateSelect">
            <option>Loading...</option>
        </select>

        <select id="timeSelect">
            <option>Loading...</option>
        </select>

        <button id="downloadCSV">⬇ Download CSV</button>

    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- CHART -->
    <div class="chart-container">
        <h3>📊 Weather Chart</h3>
        <canvas id="myChart"></canvas>
    </div>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- JS -->
<script src="forecast.js"></script>

</body>
</html>
