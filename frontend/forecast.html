<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>India Weather Forecast Dashboard</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

header{
    background:#1976d2;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    padding:15px;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    background:white;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
}

.controls div{
    display:flex;
    flex-direction:column;
}

select{
    min-width:180px;
    padding:8px;
}

.download-btn{
    background:#d32f2f;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    margin-top:20px;
}

.download-btn.allowed{
    background:#2e7d32;
}

.download-note{
    width:100%;
    font-size:12px;
    color:#666;
}

#map{
    width:100%;
    height:550px;
    border-radius:8px;
    margin-bottom:20px;
}

.chart-container{
    background:white;
    padding:15px;
    border-radius:8px;
}

</style>

</head>

<body>

<header>
    <h1>🌦 India District Weather Forecast Dashboard</h1>
</header>

<div class="container">

    <div class="controls">

        <div>
            <label><strong>State</strong></label>
            <select id="stateSelect">
                <option value="">All States</option>
            </select>
        </div>

        <div>
            <label><strong>District</strong></label>
            <select id="districtSelect">
                <option value="">All Districts</option>
            </select>
        </div>

        <div>
            <label><strong>Date</strong></label>
            <select id="dateSelect">
                <option>Loading...</option>
            </select>
        </div>

        <div>
            <label><strong>Time</strong></label>
            <select id="timeSelect">
                <option>Loading...</option>
            </select>
        </div>

        <div>
            <button id="downloadCSV"
            class="download-btn">
                🔒 Download Restricted
            </button>
        </div>

        <div class="download-note">
            Download access is currently available only for
            Punjab and West Bengal datasets.
        </div>

    </div>

    <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="forecast.js"></script>

<!--<script src="map.js"></script>


</body>
</html>
