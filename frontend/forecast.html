<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India District Weather Forecast Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        header {
            background: #1976d2;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .controls {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        select {
            padding: 8px;
            min-width: 180px;
        }

        #map {
            height: 550px;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }

        .chart-container {
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        canvas {
            max-height: 450px;
        }
    </style>
</head>

<body>

<header>
    <h1>🌦 India District Weather Forecast Dashboard</h1>
</header>

<div class="container">

    <!-- CONTROLS -->
    <div class="controls">

        <!-- STATE DROPDOWN (NEW) -->
        <div>
            <label><strong>🏛 State</strong></label><br>
            <select id="stateSelect">
                <option value="">Select State</option>
            </select>
        </div>

        <!-- DISTRICT DROPDOWN (NEW) -->
        <div>
            <label><strong>🏙 District</strong></label><br>
            <select id="districtSelect">
                <option value="">Select District</option>
            </select>
        </div>

        <!-- DATE -->
        <div>
            <label for="dateSelect"><strong>📅 Forecast Date</strong></label><br>
            <select id="dateSelect">
                <option>Loading...</option>
            </select>
        </div>

        <!-- TIME -->
        <div>
            <label for="timeSelect"><strong>🕒 Forecast Time</strong></label><br>
            <select id="timeSelect">
                <option>Loading...</option>
            </select>
        </div>

    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- CHART -->
    <div class="chart-container">
        <h2>📊 Temperature Forecast</h2>
        <canvas id="myChart"></canvas>
    </div>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Scripts -->
<script src="map.js"></script>
<script src="forecast.js"></script>

</body>
</html>
